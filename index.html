<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScienceCoLab — 학교 간 공동 탐구</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- 카카오맵 API: config.js에서 키를 읽어 동적으로 로드합니다 -->
  <script src="js/config.js"></script>
  <script>
    const kakaoScript = document.createElement('script');
    kakaoScript.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${CONFIG.KAKAO_APP_KEY}&autoload=false&libraries=clusterer`;
    kakaoScript.onerror = () => {
      console.error('[ScienceCoLab] 카카오 SDK 스크립트 로드 실패 — 네트워크 또는 키 확인');
      const loading = document.getElementById('loading');
      if (loading) loading.textContent = '카카오 SDK 로드 실패';
    };
    kakaoScript.onload = () => {
      console.log('[ScienceCoLab] 카카오 SDK 스크립트 로드됨, kakao.maps.load 호출');
      kakao.maps.load(() => {
        console.log('[ScienceCoLab] kakao.maps.load 완료, kakaoReady dispatch');
        window.dispatchEvent(new Event('kakaoReady'));
      });
    };
    document.head.appendChild(kakaoScript);
  </script>
</head>

<body>

  <div class="header">
    <h1>🌡️ ScienceCoLab</h1>
    <p>학교 간 공동 탐구 — 함께 측정하고, 함께 발견해요</p>
    <nav class="topic-chips" id="topicChips"></nav>
  </div>

  <div id="map"></div>
  <div id="loading" class="loading">데이터를 불러오는 중...</div>

  <aside id="sidebar" class="sidebar">
    <button class="close-btn" onclick="closeSidebar()">✕</button>
    <h2 id="sb-school">학교명</h2>
    <p class="meta" id="sb-meta">측정 일시</p>

    <div class="section-title" id="sb-viz-title">측정값 시각화</div>
    <div class="chart-container" id="chart-bar-box">
      <div class="chart-subtitle" id="chart-bar-title">📊 측정 장소별 평균</div>
      <canvas id="dataChart"></canvas>
    </div>
    <div class="chart-container" id="chart-line-box">
      <div class="chart-subtitle">📈 시간순 추이 <span class="chart-hint">점을 클릭하면 그 날짜 기록이 아래에 표시됩니다</span></div>
      <canvas id="dataChartLine"></canvas>
    </div>

    <!-- 선택된 측정 기록 (기본: 최신, 차트 점 클릭 시 갱신) -->
    <div class="sr-header">
      <div class="sr-place" id="sr-place">📍 -</div>
      <div class="sr-when" id="sr-when">-</div>
      <div class="sr-stats" id="sr-stats">-</div>
    </div>

    <div class="section-title" id="sb-env-title">학교 주변 환경</div>
    <div class="tag-list" id="sb-environment"></div>

    <div class="section-title">현장 사진</div>
    <div class="sr-photo" id="sb-photos"></div>

    <div class="section-title" id="sb-notes-title">특이사항</div>
    <div class="notes" id="sb-notes">-</div>

    <div class="sr-author" id="sb-author"></div>
  </aside>

  <!-- 사진 라이트박스 -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
    <img id="lightbox-img" alt="" />
    <button type="button" class="lightbox-close" onclick="closeLightbox()" aria-label="닫기">✕</button>
  </div>

  <!-- 우측 하단 FAB: 생태 관찰 기록 추가 (생태지도 주제에서만 표시) -->
  <button id="fab" class="fab" title="관찰 기록 추가" onclick="startEcoInput()">+</button>

  <!-- 지도 위치 찍기 안내 배너 -->
  <div id="pickBanner" class="pick-banner">📍 지도를 눌러 관찰한 위치를 찍으세요 <button type="button" onclick="cancelEcoInput()">취소</button></div>

  <!-- 생태 관찰 입력 모달 -->
  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal" role="dialog" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle">🌿 생태 관찰 기록</h2>
        <button type="button" class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <form id="submitForm" class="modal-form" onsubmit="handleSubmit(event)">
        <div class="picked-coord">
          <span>📍 찍은 위치: <strong id="f-coord-text">-</strong></span>
          <button type="button" class="btn-link" onclick="repickEcoLocation()">지도에서 다시 찍기</button>
          <input type="hidden" name="lat" id="f-lat" />
          <input type="hidden" name="lng" id="f-lng" />
        </div>
        <label>
          <span>학교 <em>*</em></span>
          <select name="school" id="f-school" required></select>
        </label>
        <label>
          <span>학교 비밀번호 <em>*</em></span>
          <input type="password" name="password" required autocomplete="off" />
        </label>
        <div class="form-row">
          <label>
            <span>학번 <em>*</em></span>
            <input type="text" name="studentId" required maxlength="10" placeholder="20831" />
          </label>
          <label>
            <span>이름 <em>*</em></span>
            <input type="text" name="studentName" required maxlength="30" />
          </label>
        </div>
        <label>
          <span>관찰 날짜 <em>*</em></span>
          <input type="date" name="date" id="f-date" required />
        </label>
        <label>
          <span>관찰 장소 설명 <em>*</em></span>
          <input type="text" name="location" required maxlength="60" placeholder="예: 운동장 화단 옆" />
        </label>
        <label>
          <span>관찰한 생명체 (동물·식물) <em>*</em></span>
          <input type="text" name="species" required maxlength="40" placeholder="예: 민들레, 참새" />
        </label>
        <label>
          <span>개체 수 <em>*</em></span>
          <input type="number" name="count" min="1" step="1" required placeholder="12" />
        </label>
        <div class="form-row">
          <label>
            <span>온도 (℃) <span class="opt">식물이면</span></span>
            <input type="number" name="temp" step="0.1" />
          </label>
          <label>
            <span>습도 (%) <span class="opt">식물이면</span></span>
            <input type="number" name="humidity" min="0" max="100" step="1" />
          </label>
        </div>
        <label>
          <span>관찰 사진 <em>*</em></span>
          <input type="file" name="photo" id="f-photo" accept="image/*" capture="environment" required />
          <img id="photoPreview" class="photo-preview" alt="" />
        </label>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="closeModal()">취소</button>
          <button type="submit" class="btn-primary" id="submitBtn">제출</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 토스트 알림 -->
  <div id="toast" class="toast"></div>

  <script src="js/topics.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
