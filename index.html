<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScienceCoLab — 학교 간 공동 탐구</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- 카카오맵 API: config.js에서 키를 읽어 동적으로 로드합니다 -->
  <script src="js/config.js"></script>
  <script>
    const kakaoScript = document.createElement('script');
    kakaoScript.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${CONFIG.KAKAO_APP_KEY}&autoload=false&libraries=clusterer`;
    kakaoScript.onerror = () => {
      console.error('[ScienceCoLab] 카카오 SDK 스크립트 로드 실패 — 네트워크 또는 키 확인');
      const loading = document.getElementById('loading');
      if (loading) loading.textContent = '카카오 SDK 로드 실패';
    };
    kakaoScript.onload = () => {
      console.log('[ScienceCoLab] 카카오 SDK 스크립트 로드됨, kakao.maps.load 호출');
      kakao.maps.load(() => {
        console.log('[ScienceCoLab] kakao.maps.load 완료, kakaoReady dispatch');
        window.dispatchEvent(new Event('kakaoReady'));
      });
    };
    document.head.appendChild(kakaoScript);
  </script>
</head>

<body>

  <div class="header">
    <div id="authArea" class="auth-area">
      <button type="button" id="loginBtn" class="auth-btn" onclick="openLoginModal()">로그인</button>
      <span id="authUser" class="auth-user" hidden>
        <span id="authUserText"></span>
        <button type="button" class="auth-logout" onclick="logout()">로그아웃</button>
      </span>
    </div>
    <h1>🌡️ ScienceCoLab</h1>
    <p>학교 간 공동 탐구 — 함께 측정하고, 함께 발견해요</p>
    <nav class="topic-chips" id="topicChips"></nav>
  </div>

  <div id="map"></div>
  <div id="loading" class="loading">데이터를 불러오는 중...</div>

  <aside id="sidebar" class="sidebar">
    <button class="close-btn" onclick="closeSidebar()">✕</button>
    <h2 id="sb-school">학교명</h2>
    <p class="meta" id="sb-meta">측정 일시</p>

    <div class="section-title" id="sb-viz-title">측정값 시각화</div>
    <div class="chart-container" id="chart-bar-box">
      <div class="chart-subtitle" id="chart-bar-title">📊 측정 장소별 평균</div>
      <canvas id="dataChart"></canvas>
    </div>
    <div class="chart-container" id="chart-line-box">
      <div class="chart-subtitle">📈 시간순 추이 <span class="chart-hint">점을 클릭하면 그 날짜 기록이 아래에 표시됩니다</span></div>
      <canvas id="dataChartLine"></canvas>
    </div>

    <!-- 선택된 측정 기록 (기본: 최신, 차트 점 클릭 시 갱신) -->
    <div class="sr-header">
      <div class="sr-place" id="sr-place">📍 -</div>
      <div class="sr-when" id="sr-when">-</div>
      <div class="sr-stats" id="sr-stats">-</div>
    </div>
    <!-- 본인이 작성한 기록일 때만 표시 -->
    <div id="sr-actions" class="sr-actions" style="display:none"></div>

    <div class="section-title" id="sb-env-title">학교 주변 환경</div>
    <div class="tag-list" id="sb-environment"></div>

    <div class="section-title">현장 사진</div>
    <div class="sr-photo" id="sb-photos"></div>

    <div class="section-title" id="sb-notes-title">특이사항</div>
    <div class="notes" id="sb-notes">-</div>

    <div class="sr-author" id="sb-author"></div>
  </aside>

  <!-- 사진 라이트박스 -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
    <img id="lightbox-img" alt="" />
    <button type="button" class="lightbox-close" onclick="closeLightbox()" aria-label="닫기">✕</button>
  </div>

  <!-- 우측 하단: 현재 위치로 이동 -->
  <button id="locateBtn" class="locate-btn" title="현재 위치로 이동" aria-label="현재 위치로 이동" onclick="onLocateClick()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
      <circle cx="12" cy="12" r="4.5"></circle>
      <circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"></circle>
      <path d="M12 2.5v3.2M12 18.3v3.2M2.5 12h3.2M18.3 12h3.2"></path>
    </svg>
  </button>

  <!-- 우측 하단 FAB: 생태 관찰 기록 추가 (생태지도 주제에서만 표시) -->
  <button id="fab" class="fab" title="측정 기록 추가" onclick="onFabClick()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
      <path d="M12 5v14M5 12h14"></path>
    </svg>
  </button>

  <!-- 지도 위치 찍기 안내 배너 -->
  <div id="pickBanner" class="pick-banner">📍 지도를 눌러 관찰한 위치를 찍으세요 <button type="button" onclick="cancelEcoInput()">취소</button></div>

  <!-- 로그인 모달 -->
  <div id="loginBackdrop" class="modal-backdrop">
    <div class="modal modal-narrow" role="dialog" aria-labelledby="loginTitle">
      <div class="modal-header">
        <h2 id="loginTitle">🔑 로그인</h2>
        <button type="button" class="close-btn" onclick="closeLoginModal()">✕</button>
      </div>
      <form id="loginForm" class="modal-form" onsubmit="handleLogin(event)">
        <!-- 학생 로그인 필드 -->
        <div id="loginStudentFields">
          <label>
            <span>주제 <em>*</em></span>
            <select name="topic" id="login-topic" required></select>
          </label>
          <label>
            <span>학교 <em>*</em></span>
            <select name="school" id="login-school" required></select>
          </label>
          <div class="form-row">
            <label>
              <span>학번 <em>*</em></span>
              <input type="text" name="studentId" required maxlength="10" placeholder="20831" />
            </label>
            <label>
              <span>이름 <em>*</em></span>
              <input type="text" name="studentName" required maxlength="30" />
            </label>
          </div>
          <label>
            <span>학교 비밀번호 <em>*</em></span>
            <input type="password" name="password" autocomplete="off" />
          </label>
        </div>
        <!-- 관리자 로그인 필드 (숨김) -->
        <div id="loginAdminFields" hidden>
          <label>
            <span>관리자 비밀번호 <em>*</em></span>
            <input type="password" name="adminPassword" autocomplete="off" />
          </label>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="closeLoginModal()">취소</button>
          <button type="submit" class="btn-primary" id="loginSubmitBtn">로그인</button>
        </div>
        <div class="login-mode-toggle">
          <a href="#" id="loginModeLink" onclick="toggleLoginMode(event)">관리자 로그인</a>
        </div>
      </form>
    </div>
  </div>

  <!-- 설문 입력 모달 (주제별 inputFields 기준으로 본문 동적 렌더) -->
  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal" role="dialog" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle">측정 기록</h2>
        <button type="button" class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <form id="submitForm" class="modal-form" onsubmit="handleSubmit(event)">
        <div id="modalIdentity" class="modal-identity"></div>
        <div id="modalFields"></div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="closeModal()">취소</button>
          <button type="submit" class="btn-primary" id="submitBtn">제출</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 즉석 촬영 카메라 오버레이 -->
  <div id="cameraOverlay" class="camera-overlay">
    <video id="cameraVideo" class="camera-video" autoplay playsinline muted></video>
    <div class="camera-controls">
      <button type="button" class="cam-cancel" onclick="closeCamera()">취소</button>
      <button type="button" class="cam-shoot" onclick="captureCameraPhoto()" aria-label="촬영"></button>
      <span class="cam-spacer"></span>
    </div>
  </div>
  <canvas id="cameraCanvas" hidden></canvas>

  <!-- 토스트 알림 -->
  <div id="toast" class="toast"></div>

  <script src="js/topics.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
